<div class="container">
  <h2>GitHub OAuth Integration</h2>

  <!-- Show Connect Button If Not Connected -->
  <button *ngIf="!isConnected" (click)="connectToGitHub()" mat-raised-button color="primary">
    Connect with GitHub
  </button>

  <!-- Show User Info & Expandable Panel If Connected -->
  <div *ngIf="isConnected">
    <mat-card class="user-card">
      <img mat-card-avatar [src]="avatarUrl" alt="Avatar" />
      <mat-card-title>Connected as {{ username }}</mat-card-title>
      <mat-card-subtitle>Last synced: {{ lastSynced | date: 'medium' }}</mat-card-subtitle>
    </mat-card>

    <!-- Expandable Panel for GitHub Integration Options -->
    <mat-accordion>
      <mat-expansion-panel>
        <mat-expansion-panel-header>
          <mat-panel-title>GitHub Integration Options</mat-panel-title>
        </mat-expansion-panel-header>

        <!-- Remove Integration Button -->
        <button mat-raised-button color="warn" (click)="removeConnection()">Remove Integration</button>

        <!-- Active Integration Dropdown -->
        <div class="dropdown-container">
          <mat-form-field appearance="outline">
            <mat-label>Active Integration</mat-label>
            <mat-select [(value)]="activeIntegration">
              <mat-option value="GitHub">GitHub</mat-option>
            </mat-select>
          </mat-form-field>
        </div>

        <!-- Entity Dropdown (List of MongoDB Collections) -->
        <div class="dropdown-container">
          <mat-form-field appearance="outline">
            <mat-label>Select Collection</mat-label>
            <mat-select [(value)]="selectedCollection" (selectionChange)="fetchCollectionData()">
              <mat-option *ngFor="let collection of collections" [value]="collection">
                {{ collection }}
              </mat-option>
            </mat-select>
          </mat-form-field>
        </div>

        <!-- Search Input for AG Grid -->
        <mat-form-field appearance="outline">
          <mat-label>Search</mat-label>
          <input matInput (input)="onSearch($event)" placeholder="Search across all fields" />
        </mat-form-field>
      </mat-expansion-panel>
    </mat-accordion>

    <!-- AG Grid Table -->
    <div class="ag-theme-alpine grid-container">
      <ag-grid-angular
        class="ag-theme-alpine"
        style="width: 100%; height: 400px;"
        [rowData]="rowData"
        [columnDefs]="columnDefs"
        [pagination]="true"
        [paginationPageSize]="10"
        rowModelType="clientSide"
        (gridReady)="onGridReady($event)">
      </ag-grid-angular>
    </div>
  </div>
</div>
